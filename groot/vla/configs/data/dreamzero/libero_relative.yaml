# @package _global_

defaults:
  - dreamzero/base_48_wan_fine_aug_relative
  - _self_

# Keep the same relative-action single-arm setup used by DROID, but expose a
# separate config for LIBERO subsets converted into LeRobot layout.
max_state_dim: 64
use_global_metadata: false
relative_action: true
relative_action_per_horizon: false
relative_action_keys:
  - joint_position
max_chunk_size: 4
dataset_shard_sampling_rate: 0.1
mixture_dataset_cls: groot.vla.data.dataset.lerobot_sharded.ShardedLeRobotMixtureDataset.from_mixture_spec
single_dataset_cls: groot.vla.data.dataset.lerobot_sharded.ShardedLeRobotSubLangSingleActionChunkDatasetSingleArm

# Override via CLI:
#   libero_data_root=/path/to/libero_subset_lerobot
libero_data_root: ???

train_dataset:
  _target_: ${mixture_dataset_cls}
  _convert_: object
  mixture_spec:
    - dataset_path:
        libero_single_arm:
          - ${libero_data_root}
      dataset_weight: 1.0
      distribute_weights: true

  dataset_class: ${single_dataset_cls}
  all_modality_configs: ${modality_configs}
  all_transforms: ${transforms}
  metadata_versions: ${metadata_versions}
  fps: ${fps}
  dataset_kwargs:
    video_backend: decord
    use_global_metadata: ${use_global_metadata}
    max_chunk_size: ${max_chunk_size}
    relative_action: ${relative_action}
    relative_action_keys: ${relative_action_keys}
    relative_action_per_horizon: ${relative_action_per_horizon}
  mixture_kwargs:
    training: true
    balance_dataset_weights: false
    seed: 42
    shard_sampling_rate: ${dataset_shard_sampling_rate}

# Reuse the proven DROID single-arm modality layout; the LIBERO subset
# conversion should write camera/state/action/language fields to the same keys.
modality_configs:
  libero_single_arm: ${modality_config_oxe_droid}

transforms:
  libero_single_arm: ${transform_oxe_droid}

metadata_versions:
  libero_single_arm: "0221"

# User recommendation: start with 5 FPS video for the single-arm subset.
fps:
  libero_single_arm: 5
